name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build --wheel

      - name: Checkout axon-dist
        uses: actions/checkout@v4
        with:
          repository: Taurine-Technology/axon-dist
          token: ${{ secrets.AXON_DIST_TOKEN }}
          path: axon-dist

      - name: Publish wheel into axon-dist
        working-directory: axon-dist
        run: python publish-wheel.py --wheel ../dist/*.whl

      - name: Commit and push (rebase-retry on race)
        working-directory: axon-dist
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add simple/
          if git diff --cached --quiet; then
            echo "No changes staged — wheel already present?"
            exit 1
          fi
          git commit -m "Publish ${GITHUB_REPOSITORY##*/} ${GITHUB_REF_NAME} (from ${GITHUB_SHA::7})"
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt ${attempt}"
              exit 0
            fi
            echo "Push attempt ${attempt} failed; rebasing on origin/main"
            git pull --rebase origin main
          done
          echo "git push failed after 3 attempts"
          exit 1
